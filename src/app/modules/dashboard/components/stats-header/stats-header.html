<div class="stats-bar">
  <div class="stat-card" *ngFor="let s of stats">
    <div class="stat-icon" [style.background]="s.bg">
      <span [innerHTML]="s.icon"></span>
    </div>
    <div class="stat-info">
      <span class="stat-label">{{ s.label }}</span>
      <strong class="stat-val" [style.color]="loading ? '#9ca3af' : 'inherit'">
        {{ loading ? '—' : s.value }}
      </strong>
      <span class="stat-change" *ngIf="!loading">{{ s.change }}</span>
    </div>
  </div>
</div>
