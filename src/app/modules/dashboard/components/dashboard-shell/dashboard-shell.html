<div class="crm-layout" [class.sidebar-collapsed]="sidebarCollapsed">
  <app-dash-sidebar></app-dash-sidebar>
  <div class="crm-body">
    <header class="crm-header">
      <button class="icon-btn" (click)="toggleSidebar()" [attr.aria-label]="'Toggle sidebar'">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="search-bar">
        <svg width="15" height="15" fill="none" stroke="#9ca3af" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input
          type="text"
          placeholder="Search by ID, subject, requester..."
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearchChange()"
        />
        <button *ngIf="searchTerm" class="clear-search" (click)="searchTerm=''; onSearchChange()" aria-label="Clear">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="priority-filter">
        <button class="filter-btn" type="button" (click)="togglePriority()" [class.open]="priorityOpen">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          {{ priorityLabel }}
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="priority-menu" *ngIf="priorityOpen">
          <button
            *ngFor="let opt of priorityOptions"
            type="button"
            class="priority-option"
            [class.active]="priority === opt.value"
            (click)="selectPriority(opt)"
          >{{ opt.label }}</button>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </button>
        <button class="icon-btn" (click)="refresh()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        </button>
        <div class="avatar">A</div>
        <button class="logout-btn" (click)="logout()" title="Sign out">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Logout</span>
        </button>
      </div>
    </header>
    <app-stats-header [tickets]="allTickets" [loading]="statsLoading"></app-stats-header>
    <div class="crm-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
