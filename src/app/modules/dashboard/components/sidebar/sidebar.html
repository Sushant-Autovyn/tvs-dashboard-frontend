<aside class="sidebar">
  <div class="brand">
    <div class="brand-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="9" rx="1.5"/>
        <rect x="14" y="3" width="7" height="5" rx="1.5"/>
        <rect x="14" y="12" width="7" height="9" rx="1.5"/>
        <rect x="3" y="16" width="7" height="5" rx="1.5"/>
      </svg>
    </div>
    <span class="brand-name">Dashboard</span>
  </div>

  <a class="customer-portal" routerLink="/dashboard/all">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    Customer Portal
  </a>

  <div class="nav-section-label">TICKETS</div>
  <nav class="nav">
    <a class="nav-item" routerLink="/dashboard/all" routerLinkActive="active">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      All Tickets
      <span class="badge">{{ counts.all }}</span>
    </a>
    <a class="nav-item" routerLink="/dashboard/new" routerLinkActive="active">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      New
      <span class="badge" *ngIf="counts.new > 0">{{ counts.new }}</span>
    </a>
    <a class="nav-item" routerLink="/dashboard/pending" routerLinkActive="active">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
      Pending
      <span class="badge" *ngIf="counts.pending > 0">{{ counts.pending }}</span>
    </a>
    <a class="nav-item" routerLink="/dashboard/solved" routerLinkActive="active">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      Solved
      <span class="badge" *ngIf="counts.solved > 0">{{ counts.solved }}</span>
    </a>
    <a class="nav-item" routerLink="/dashboard/unassigned" routerLinkActive="active">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><line x1="17" y1="11" x2="23" y2="11"/></svg>
      Unassigned
      <span class="badge" *ngIf="counts.unassigned > 0">{{ counts.unassigned }}</span>
    </a>
  </nav>

</aside>
